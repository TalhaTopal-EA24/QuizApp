<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizApp</title>
</head>
<body>
    <!-- Ekran 1: Anasayfa -->
    <section id="screen-home" class="screen active">
 
    <div class="home-title">
      <h1>Quiz<span class="accent">App</span></h1>
      <p>Bilgini test et, skorunu geliştir.</p>
    </div>
 
    <!-- Son quiz banner (localStorage'dan gelir) -->
    <div id="last-banner" style="display:none">
      <div class="lb-left">
        <div class="lb-name" id="lb-name">—</div>
        <div class="lb-meta" id="lb-meta">—</div>
      </div>
      <div class="lb-right">
        <div class="lb-score" id="lb-score">0</div>
        <div class="lb-sub">son skor</div>
      </div>
    </div>
 
    <div>
      <label>İsmin</label>
      <input type="text" id="inp-name" placeholder="Adını gir..." maxlength="20" />
    </div>
 
    <div>
      <label>Kategori</label>
      <div class="pills" id="pills-cat">
        <button class="pill on" data-val="Teknoloji">⚡ Teknoloji</button>
        <button class="pill"    data-val="Bilim">🔬 Bilim</button>
        <button class="pill"    data-val="Tarih">🏛️ Tarih</button>
        <button class="pill"    data-val="Matematik">∑ Matematik</button>
      </div>
    </div>
 
    <div>
      <label>Zorluk</label>
      <div class="pills" id="pills-diff">
        <button class="pill on" data-val="Kolay">Kolay</button>
        <button class="pill"    data-val="Orta">Orta</button>
        <button class="pill"    data-val="Zor">Zor</button>
      </div>
    </div>
 
    <div>
      <label>Soru Sayısı</label>
      <div class="pills" id="pills-count">
        <button class="pill"    data-val="5">5</button>
        <button class="pill on" data-val="10">10</button>
        <button class="pill"    data-val="15">15</button>
        <button class="pill"    data-val="20">20</button>
      </div>
    </div>
 
    <button class="btn btn-primary" id="btn-start">Başla →</button>
    <button class="btn btn-outline btn-sm" id="btn-hist">📋 Geçmiş Quizler</button>
 
  </section>

    <!-- Ekran 2: Quiz -->
    <section id="screen-quiz" class="screen">
    
        <div class="quiz-top">
            <button class="exit-btn" id="btn-exit">✕ Çıkış</button>
            <span class="q-info" id="q-counter">1 / 10</span>
            <span class="q-score" id="q-score">0 puan</span>
        </div>
    
        <div class="prog-track">
            <div class="prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
    
        <div class="timer-row">
            <div class="timer-track">
                <div class="timer-fill" id="timer-fill"></div>
            </div>
            <span class="timer-num" id="timer-num">20</span>
        </div>
    
        <div class="card q-card">
            <h2 id="q-text">—</h2>
        </div>
    
        <div class="answers" id="answers"></div>
    
    </section>

    <!-- Ekran 3: Sonuç -->

    <section id="screen-result" class="screen">
    
        <div class="res-emoji" id="res-emoji">🎉</div>
        <div>
            <div class="res-score" id="res-score">0</div>
            <div class="res-lbl">puan</div>
        </div>
        <h2 id="res-title">Tamamlandı!</h2>
    
        <div class="stats-row">
            <div class="stat">
                <span class="v green" id="res-correct">0</span>
                <span class="l">Doğru</span>
            </div>
            <div class="stat">
                <span class="v red" id="res-wrong">0</span>
                <span class="l">Yanlış</span>
            </div>
            <div class="stat">
                <span class="v grey" id="res-acc">0%</span>
                <span class="l">Doğruluk</span>
            </div>
        </div>
    
        <div class="res-btns">
            <button class="btn btn-outline" id="btn-again">↩ Tekrar</button>
            <button class="btn btn-primary" id="btn-home">Ana Sayfa</button>
        </div>
    
    </section>
    
    <!-- Ekran 4: Geçmiş -->
    
    <section id="screen-history" class="screen">
    
        <div class="hist-head">
            <h2>Geçmiş Quizler</h2>
            <button class="btn btn-outline btn-sm" id="btn-hist-back">← Geri</button>
        </div>
    
        <div class="hist-list" id="hist-list">
            <div class="empty">Henüz quiz yapılmadı.</div>
        </div>
    
    </section>
    
    <script src="app.js"></script>
    
</body>
</html>
